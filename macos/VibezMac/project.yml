name: VibezMac
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: io.bike-shed.vibez.mac
    PRODUCT_NAME: Vibez
    SWIFT_VERSION: 6.0
targets:
  VibezMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
      - Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: vibez
        CFBundleURLTypes:
          - CFBundleURLName: io.bike-shed.vibez.mac
            CFBundleURLSchemes:
              - vibez
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - sdk: WebKit.framework
