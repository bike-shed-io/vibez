<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibez — Team Radio</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header class="header">
    <h1><span>vibez</span> radio</h1>
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Join screen -->
  <div class="container" id="joinScreen">
    <div class="join-screen">
      <h2>Join the radio</h2>
      <p>Enter your name to tune in</p>
      <input type="text" id="nameInput" placeholder="Your name" maxlength="30" autofocus />
      <button class="btn-primary" id="joinBtn">Tune In</button>
    </div>
  </div>

  <!-- Main radio screen -->
  <div class="container hidden" id="radioScreen">

    <!-- Now Playing -->
    <div class="now-playing">
      <div class="label">Now Playing</div>
      <div id="trackInfo" class="hidden">
        <div class="track-info">
          <img class="track-artwork" id="trackArtwork" src="" alt="" />
          <div class="track-details">
            <h3 id="trackTitle"></h3>
            <div class="dj-name">DJ: <span id="djName">—</span></div>
          </div>
        </div>
        <div class="sc-embed">
          <iframe id="scWidget" width="100%" height="166" scrolling="no" frameborder="no"
            allow="autoplay"
            src="about:blank">
          </iframe>
        </div>
      </div>
      <div id="noTrack" class="no-track">
        No track playing — waiting for a DJ
      </div>
    </div>

    <!-- DJ section -->
    <div class="dj-section">
      <button class="btn-secondary" id="djToggle">Become DJ</button>
    </div>

    <!-- DJ Controls (only visible when DJ) -->
    <div class="dj-controls hidden" id="djControls">
      <div class="url-row">
        <input type="url" id="trackUrlInput" placeholder="Paste SoundCloud URL..." />
        <button class="btn-primary" id="playBtn">Play</button>
      </div>
      <div class="playback-row">
        <button class="btn-secondary" id="pauseBtn">Pause</button>
        <button class="btn-secondary" id="resumeBtn">Resume</button>
      </div>
    </div>

    <!-- Listeners -->
    <div class="listeners">
      <div class="label">Listeners (<span id="listenerCount">0</span>)</div>
      <div class="listener-list" id="listenerList"></div>
    </div>
  </div>

  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script src="/radio.js"></script>
</body>
</html>
